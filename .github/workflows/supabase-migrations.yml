name: Deploy (Supabase migrations + App)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
  VITE_SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_REF }}

jobs:
  verify:
    name: Phase 1 · Verify Connection
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=()

          for var in \
            SUPABASE_PROJECT_REF \
            SUPABASE_ACCESS_TOKEN \
            SUPABASE_DB_PASSWORD \
            SUPABASE_URL \
            SUPABASE_PUBLISHABLE_KEY \
            SUPABASE_SERVICE_ROLE_KEY
          do
            if [ -z "${!var:-}" ]; then
              missing+=("$var")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing secrets: ${missing[*]}"
            exit 1
          fi

          echo "All required secrets found."

      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        run: |
          supabase link \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Verify Authentication
        run: |
          supabase projects list | head -20

  app-validate:
    name: Phase 2 · Validate Application
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Validate Migration Files
        run: |
          if [ -f scripts/ci/validate-migrations.sh ]; then
            bash scripts/ci/validate-migrations.sh
          else
            echo "No validate-migrations.sh found. Skipping."
          fi

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: |
          bunx tsgo --noEmit || bunx tsc --noEmit

      - name: Build
        run: bun run build

  migrate:
    name: Phase 3 · Apply Migrations
    runs-on: ubuntu-latest
    needs: app-validate
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Project
        run: |
          supabase link \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Pending Migrations
        run: |
          supabase migration list --linked

      - name: Apply Migrations
        run: |
          supabase db push \
            --linked \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Verify Migration State
        run: |
          supabase migration list --linked

  post-migrate-validation:
    name: Phase 4 · Schema & Security Validation
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Project
        run: |
          supabase link \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Detect Schema Drift
        run: |
          supabase db diff \
            --linked \
            --schema public \
            --file drift || true

      - name: Run Security Checks
        run: |
          if [ -f scripts/ci/security-checks.sql ]; then
            PGPASSWORD="$SUPABASE_DB_PASSWORD" psql \
            "postgresql://postgres.${SUPABASE_PROJECT_REF}:${SUPABASE_DB_PASSWORD}@aws-0-us-east-1.pooler.supabase.com:6543/postgres" \
            -v ON_ERROR_STOP=1 \
            -f scripts/ci/security-checks.sql
          else
            echo "security-checks.sql not found. Skipping."
          fi

  deploy:
    name: Phase 5 · Ready for Lovable Deploy
    runs-on: ubuntu-latest
    needs: post-migrate-validation

    steps:
      - name: Deployment Summary
        run: |
          echo "✅ Validation Passed"
          echo "✅ Migrations Applied"
          echo "✅ Security Checks Passed"
          echo ""
          echo "Application deployment is handled by Lovable Publish."
