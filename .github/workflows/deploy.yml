name: Deploy (Supabase migrations + App)

on:
  push:
    branches: [main]
  workflow_dispatch:

## Concurrency strategy
# Workflow-level group covers the pre-migration phases (verify + build).
# Rapid successive pushes cancel superseded pre-migration runs so we don't
# waste minutes on stale commits. Once a run reaches the `migrate` job (or
# later), that job re-declares its own concurrency group with
# cancel-in-progress: false, which QUEUES any newer run behind the in-flight
# database change. A migration or rollback is never interrupted mid-flight.
concurrency:
  group: deploy-production-pre-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SUPABASE_PROJECT_REF:      ${{ secrets.SUPABASE_PROJECT_REF }}
  SUPABASE_ACCESS_TOKEN:     ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD:      ${{ secrets.SUPABASE_DB_PASSWORD }}
  SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
  SUPABASE_PUBLISHABLE_KEY:  ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  DATABASE_URL:              ${{ secrets.DATABASE_URL }}
  # Vite build-time environment
  VITE_SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY:  ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
  VITE_SUPABASE_PROJECT_ID:       ${{ secrets.SUPABASE_PROJECT_REF }}

jobs:
  # ------------------------------------------------------------------
  # PHASE 1 — Secrets + Supabase auth
  # ------------------------------------------------------------------
  verify:
    name: Phase 1 · Verify Secrets & Supabase Auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required GitHub Secrets
        run: bash scripts/ci/validate-secrets.sh

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Authenticate Supabase CLI (login)
        env: { RETRIES: "4", BASE_DELAY: "5" }
        run: |
          set -euo pipefail
          bash scripts/ci/retry.sh "supabase login" -- \
            supabase login --token "$SUPABASE_ACCESS_TOKEN"
          echo "✓ Supabase CLI authenticated."

      - name: Link production project
        env: { RETRIES: "4", BASE_DELAY: "5" }
        run: |
          set -euo pipefail
          bash scripts/ci/retry.sh "supabase link" -- \
            supabase link \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --password   "$SUPABASE_DB_PASSWORD"
          echo "✓ Linked to project $SUPABASE_PROJECT_REF."

      - name: Verify authenticated identity
        env: { RETRIES: "4", BASE_DELAY: "5" }
        run: |
          set -euo pipefail
          bash scripts/ci/retry.sh "supabase projects list" -- \
            bash -c 'supabase projects list > /tmp/projects.txt'
          # Deterministic assertion — fail fast, no retry.
          if ! grep -q "$SUPABASE_PROJECT_REF" /tmp/projects.txt; then
            echo "::error::Authenticated account cannot see project $SUPABASE_PROJECT_REF"
            exit 1
          fi
          {
            echo "## ✅ Supabase Authentication"
            echo ""
            echo "- CLI login: ✅"
            echo "- Project link: ✅ \`$SUPABASE_PROJECT_REF\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------
  # PHASE 2 — Application build gate
  # ------------------------------------------------------------------
  app-validate:
    name: Phase 2 · Migrations · Lint · Typecheck · Build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        env: { RETRIES: "3", BASE_DELAY: "10" }
        run: bash scripts/ci/retry.sh "bun install" -- bun install --frozen-lockfile

      - name: Prepare log dir
        run: mkdir -p /tmp/ci-logs

      - name: Validate migration files
        run: bash scripts/ci/validate-migrations.sh 2>&1 | tee /tmp/ci-logs/validate-migrations.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-app-validate-logs
          path: /tmp/ci-logs/
          retention-days: 30
          if-no-files-found: warn

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsgo --noEmit || bunx tsc --noEmit

      - name: Production build
        run: bun run build

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🏗️  Build"
            echo ""
            echo "- Install: ✅"
            echo "- Lint: ✅"
            echo "- Typecheck: ✅"
            echo "- Build: ✅"
          } >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------
  # PHASE 3 — Apply migrations (snapshot → dry-run → apply)
  # ------------------------------------------------------------------
  migrate:
    name: Phase 3 · Apply Migrations
    runs-on: ubuntu-latest
    needs: app-validate
    environment: production
    # Serialize DB-mutating work across the ENTIRE repo (all refs).
    # cancel-in-progress: false queues concurrent runs so an in-flight
    # migration or rollback is never interrupted.
    concurrency:
      group: deploy-production-apply
      cancel-in-progress: false
    outputs:
      snapshot_ok: ${{ steps.snapshot.outcome }}
      apply_ok:    ${{ steps.apply.outcome }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install psql
        env: { RETRIES: "3", BASE_DELAY: "5" }
        run: |
          set -euo pipefail
          bash scripts/ci/retry.sh "apt update" -- sudo apt-get update -qq
          bash scripts/ci/retry.sh "apt install postgresql-client" -- \
            sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Authenticate & link
        env: { RETRIES: "4", BASE_DELAY: "5" }
        run: |
          set -euo pipefail
          bash scripts/ci/retry.sh "supabase login" -- \
            supabase login --token "$SUPABASE_ACCESS_TOKEN"
          bash scripts/ci/retry.sh "supabase link" -- \
            supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Capture pre-migration snapshot
        id: snapshot
        env:
          ARTIFACT_DIR: /tmp/pre-migration
        run: bash scripts/ci/snapshot-pre-migration.sh

      - name: Upload pre-migration snapshot
        if: always() && steps.snapshot.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: pre-migration-snapshot
          path: /tmp/pre-migration/
          retention-days: 30

      - name: Show pending migrations
        id: pending
        env: { RETRIES: "4", BASE_DELAY: "5" }
        run: |
          set -euo pipefail
          bash scripts/ci/retry.sh "migration list (before)" -- \
            bash -c 'supabase migration list --linked | tee /tmp/mig-before.txt'
          pending=$(grep -c '^ *[0-9]\{14\}' /tmp/mig-before.txt || true)
          echo "count=${pending:-0}" >> "$GITHUB_OUTPUT"

      - name: Dry-run migration push
        env: { RETRIES: "3", BASE_DELAY: "5" }
        run: |
          set -euo pipefail
          # Dry-run is read-only → safe to retry on network flakes.
          bash scripts/ci/retry.sh "db push --dry-run" -- \
            bash -c 'supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --dry-run | tee /tmp/mig-dry.txt'

      # NO retry wrapper — a partial apply must NOT be replayed automatically.
      # Failures here are handled by the rollback step below, using the
      # pre-migration snapshot + paired down-migrations.
      - name: Apply migrations
        id: apply
        run: |
          set -euo pipefail
          supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --include-all \
            | tee /tmp/mig-apply.txt

      - name: Confirm migration state
        if: always()
        env: { RETRIES: "4", BASE_DELAY: "5" }
        run: |
          set -euo pipefail
          bash scripts/ci/retry.sh "migration list (after)" -- \
            bash -c 'supabase migration list --linked | tee /tmp/mig-after.txt' || true

      # -----------------------------------------------------------------
      # In-job automatic rollback for partial application failures.
      # If `supabase db push` failed after committing SOME migrations,
      # reverse them immediately using the paired rollback scripts.
      # -----------------------------------------------------------------
      - name: Automatic rollback on partial-apply failure
        if: failure() && steps.apply.outcome == 'failure' && steps.snapshot.outcome == 'success'
        env:
          ARTIFACT_DIR: /tmp/pre-migration
          STRICT: "1"
        run: bash scripts/ci/rollback-migrations.sh

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🗄️  Migrations"
            echo ""
            echo "- Pending before: **${{ steps.pending.outputs.count }}**"
            echo "- Apply status: **${{ steps.apply.outcome }}**"
            echo ""
            echo "<details><summary>Applied output</summary>"
            echo ""
            echo '```'
            tail -c 6000 /tmp/mig-apply.txt 2>/dev/null || echo "(no output)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------
  # PHASE 4 — Schema drift + security checks
  # ------------------------------------------------------------------
  post-migrate-validate:
    name: Phase 4 · Schema Drift & Security Checks
    runs-on: ubuntu-latest
    needs: migrate
    # Same serialization group as migrate: post-migration checks hold the
    # production lock so a newer push can't start applying migrations while
    # we're still validating (or rolling back) the current deployment.
    concurrency:
      group: deploy-production-apply
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install psql
        env: { RETRIES: "3", BASE_DELAY: "5" }
        run: |
          set -euo pipefail
          bash scripts/ci/retry.sh "apt update" -- sudo apt-get update -qq
          bash scripts/ci/retry.sh "apt install postgresql-client" -- \
            sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Authenticate & link
        env: { RETRIES: "4", BASE_DELAY: "5" }
        run: |
          set -euo pipefail
          bash scripts/ci/retry.sh "supabase login" -- \
            supabase login --token "$SUPABASE_ACCESS_TOKEN"
          bash scripts/ci/retry.sh "supabase link" -- \
            supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Detect schema drift (post-deploy re-diff)
        run: bash scripts/ci/verify-schema.sh

      - name: Confirm migration order & checksums
        run: bash scripts/ci/verify-migration-order.sh

      - name: Run RLS + grant + security-definer + required-policy assertions
        run: bash scripts/ci/verify-rls.sh

  # ------------------------------------------------------------------
  # PHASE 4b — Cross-job rollback if post-migrate validation failed
  # (a fresh runner needs the snapshot artifact from the migrate job)
  # ------------------------------------------------------------------
  rollback:
    name: Phase 4b · Automated Rollback
    runs-on: ubuntu-latest
    needs: [migrate, post-migrate-validate]
    if: failure() && needs.migrate.result == 'success' && needs.post-migrate-validate.result == 'failure'
    # Rollback MUST hold the same production lock — a queued newer run
    # cannot start migrating until this rollback finishes.
    concurrency:
      group: deploy-production-apply
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install psql
        env: { RETRIES: "3", BASE_DELAY: "5" }
        run: |
          set -euo pipefail
          bash scripts/ci/retry.sh "apt update" -- sudo apt-get update -qq
          bash scripts/ci/retry.sh "apt install postgresql-client" -- \
            sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Authenticate & link
        env: { RETRIES: "4", BASE_DELAY: "5" }
        run: |
          set -euo pipefail
          bash scripts/ci/retry.sh "supabase login" -- \
            supabase login --token "$SUPABASE_ACCESS_TOKEN"
          bash scripts/ci/retry.sh "supabase link" -- \
            supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Download pre-migration snapshot
        uses: actions/download-artifact@v4
        with:
          name: pre-migration-snapshot
          path: /tmp/pre-migration

      - name: Execute rollback
        env:
          ARTIFACT_DIR: /tmp/pre-migration
          STRICT: "1"
        run: bash scripts/ci/rollback-migrations.sh

      - name: Summary
        if: always()
        run: |
          {
            echo "## ↩️ Post-migration rollback"
            echo ""
            echo "Post-migration validation failed. An automated rollback was executed against production using the down-migrations under \`supabase/migrations/rollback/\`."
            echo ""
            echo "If rollback itself failed, the \`pre-migration-snapshot\` artifact contains the schema dump captured before this deployment and is required for manual recovery."
          } >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------
  # PHASE 5 — Deployment gate
  # ------------------------------------------------------------------
  deploy:
    name: Phase 5 · Deployment Gate
    runs-on: ubuntu-latest
    needs: post-migrate-validate
    steps:
      - uses: actions/checkout@v4
      - name: Write deployment summary
        run: bash scripts/ci/deployment-summary.sh
