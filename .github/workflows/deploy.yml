name: Deploy (Supabase migrations + App)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  SUPABASE_PROJECT_REF:      ${{ secrets.SUPABASE_PROJECT_REF }}
  SUPABASE_ACCESS_TOKEN:     ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD:      ${{ secrets.SUPABASE_DB_PASSWORD }}
  SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
  SUPABASE_PUBLISHABLE_KEY:  ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  DATABASE_URL:              ${{ secrets.DATABASE_URL }}
  # Vite build-time environment
  VITE_SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY:  ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
  VITE_SUPABASE_PROJECT_ID:       ${{ secrets.SUPABASE_PROJECT_REF }}

jobs:
  # ------------------------------------------------------------------
  # PHASE 1 — Secrets + Supabase auth
  # ------------------------------------------------------------------
  verify:
    name: Phase 1 · Verify Secrets & Supabase Auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required GitHub Secrets
        run: bash scripts/ci/validate-secrets.sh

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Authenticate Supabase CLI (login)
        run: |
          set -euo pipefail
          supabase login --token "$SUPABASE_ACCESS_TOKEN"
          echo "✓ Supabase CLI authenticated."

      - name: Link production project
        run: |
          set -euo pipefail
          supabase link \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password   "$SUPABASE_DB_PASSWORD"
          echo "✓ Linked to project $SUPABASE_PROJECT_REF."

      - name: Verify authenticated identity
        run: |
          set -euo pipefail
          supabase projects list >/tmp/projects.txt
          if ! grep -q "$SUPABASE_PROJECT_REF" /tmp/projects.txt; then
            echo "::error::Authenticated account cannot see project $SUPABASE_PROJECT_REF"
            exit 1
          fi
          {
            echo "## ✅ Supabase Authentication"
            echo ""
            echo "- CLI login: ✅"
            echo "- Project link: ✅ \`$SUPABASE_PROJECT_REF\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------
  # PHASE 2 — Application build gate
  # ------------------------------------------------------------------
  app-validate:
    name: Phase 2 · Migrations · Lint · Typecheck · Build
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate migration files
        run: bash scripts/ci/validate-migrations.sh

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsgo --noEmit || bunx tsc --noEmit

      - name: Production build
        run: bun run build

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🏗️  Build"
            echo ""
            echo "- Install: ✅"
            echo "- Lint: ✅"
            echo "- Typecheck: ✅"
            echo "- Build: ✅"
          } >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------
  # PHASE 3 — Apply migrations (chronological, dry-run first)
  # ------------------------------------------------------------------
  migrate:
    name: Phase 3 · Apply Migrations
    runs-on: ubuntu-latest
    needs: app-validate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Authenticate & link
        run: |
          set -euo pipefail
          supabase login --token "$SUPABASE_ACCESS_TOKEN"
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Show pending migrations
        id: pending
        run: |
          set -euo pipefail
          supabase migration list --linked | tee /tmp/mig-before.txt
          pending=$(grep -c '^ *[0-9]\{14\}' /tmp/mig-before.txt || true)
          echo "count=${pending:-0}" >> "$GITHUB_OUTPUT"

      - name: Dry-run migration push
        run: |
          set -euo pipefail
          supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --dry-run \
            | tee /tmp/mig-dry.txt

      - name: Apply migrations
        run: |
          set -euo pipefail
          supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --include-all \
            | tee /tmp/mig-apply.txt

      - name: Confirm migration state
        run: |
          set -euo pipefail
          supabase migration list --linked | tee /tmp/mig-after.txt

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🗄️  Migrations"
            echo ""
            echo "- Pending before: **${{ steps.pending.outputs.count }}**"
            echo ""
            echo "<details><summary>Applied output</summary>"
            echo ""
            echo '```'
            tail -c 6000 /tmp/mig-apply.txt 2>/dev/null || echo "(no output)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------
  # PHASE 4 — Schema drift + security checks
  # ------------------------------------------------------------------
  post-migrate-validate:
    name: Phase 4 · Schema Drift & Security Checks
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install psql
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Authenticate & link
        run: |
          set -euo pipefail
          supabase login --token "$SUPABASE_ACCESS_TOKEN"
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Detect schema drift
        run: bash scripts/ci/verify-schema.sh

      - name: Run RLS + grant + security-definer assertions
        run: bash scripts/ci/verify-rls.sh

  # ------------------------------------------------------------------
  # PHASE 5 — Deployment gate
  # ------------------------------------------------------------------
  deploy:
    name: Phase 5 · Deployment Gate
    runs-on: ubuntu-latest
    needs: post-migrate-validate
    steps:
      - uses: actions/checkout@v4
      - name: Write deployment summary
        run: bash scripts/ci/deployment-summary.sh
